<div class="flex flex-col gap-1.5">

  <label
    class="flex items-start gap-3 group"
    [class.cursor-pointer]="!isDisabled"
    [class.cursor-not-allowed]="isDisabled"
    [class.opacity-50]="isDisabled"
    (click)="toggle()"
  >

    <!-- Checkbox custom -->
    <span
      class="mt-0.5 flex h-4 w-4 shrink-0 items-center justify-center rounded border transition-all duration-150"
      role="checkbox"
      [attr.aria-checked]="indeterminate() ? 'mixed' : isChecked()"
      [attr.aria-disabled]="isDisabled"
      [attr.aria-describedby]="shouldShowError ? name() + '-error' : null"
      [class.bg-primary]="isActive()"
      [class.border-primary]="isActive()"
      [class.border-border]="!isActive()"
      [class.bg-background]="!isActive()"
      [class.group-hover:border-primary/60]="!isDisabled && !isActive()"
    >
      @if (indeterminate()) {
        <lucide-icon [img]="icons.Minus" [size]="11" [strokeWidth]="3" class="text-primary-foreground" />
      } @else if (isChecked()) {
        <lucide-icon [img]="icons.Check" [size]="11" [strokeWidth]="3" class="text-primary-foreground" />
      }
    </span>

    <!-- Label + description -->
    <span class="flex flex-col gap-0.5">
      @if (label()) {
        <span
          class="text-sm font-medium leading-none transition-colors"
          [class.text-foreground]="isChecked()"
          [class.text-foreground/75]="!isChecked()"
        >
          {{ label() }}
        </span>
      }

      @if (description()) {
        <span class="text-xs text-muted-foreground leading-snug">
          {{ description() }}
        </span>
      }
    </span>

  </label>

  @if (shouldShowError) {
    <span [id]="name() + '-error'" class="text-destructive text-sm ml-7" role="alert">
      {{ errorMessage }}
    </span>
  }

</div>
