@if (open()) {
  <div
    class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/90"
    (click)="close()"
  >
    <!-- Bouton fermer -->
    <button
      type="button"
      (click)="close()"
      class="absolute top-4 right-4 flex h-10 w-10 items-center justify-center rounded-full bg-white/10 text-white hover:bg-white/20 transition-colors"
    >
      <lucide-icon [img]="XIcon" [size]="20" />
    </button>

    <!-- Compteur -->
    @if (images().length > 1) {
      <span class="absolute top-4 left-1/2 -translate-x-1/2 text-white/70 text-sm">
        {{ index() + 1 }} / {{ images().length }}
      </span>
    }

    <!-- Flèche gauche -->
    @if (images().length > 1) {
      <button
        type="button"
        (click)="$event.stopPropagation(); prev()"
        class="absolute left-4 flex h-10 w-10 items-center justify-center rounded-full bg-white/10 text-white hover:bg-white/20 transition-colors"
      >
        <lucide-icon [img]="ChevronLeftIcon" [size]="24" />
      </button>
    }

    <!-- Image -->
    @if (current()) {
      <img
        [src]="current()!.url"
        [alt]="current()!.label ?? ''"
        class="max-h-[85vh] max-w-[90vw] rounded-lg object-contain shadow-2xl"
        (click)="$event.stopPropagation()"
      />
    }

    <!-- Flèche droite -->
    @if (images().length > 1) {
      <button
        type="button"
        (click)="$event.stopPropagation(); next()"
        class="absolute right-4 flex h-10 w-10 items-center justify-center rounded-full bg-white/10 text-white hover:bg-white/20 transition-colors"
      >
        <lucide-icon [img]="ChevronRightIcon" [size]="24" />
      </button>
    }

    <!-- Label -->
    @if (current().label) {
      <p class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white/70 text-sm">
        {{ current()!.label }}
      </p>
    }
  </div>
}
