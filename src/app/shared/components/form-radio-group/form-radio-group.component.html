<fieldset class="flex flex-col gap-3">

  @if (label() !== null) {
    <legend>
      <label appLabel>{{ label() }}</label>
    </legend>
  }

  <!-- Liste des options -->
  <div [class]="containerClass()" role="radiogroup" [attr.aria-labelledby]="name() + '-label'">

    @for (option of options(); track option.value) {
      <label
        class="flex items-start gap-3 cursor-pointer group"
        [class.opacity-50]="option.disabled"
        [class.cursor-not-allowed]="option.disabled"
        [class.cursor-pointer]="!option.disabled"
        (click)="!option.disabled && select(option)"
      >
        <!-- Bouton radio custom -->
        <span
          class="mt-0.5 flex h-4 w-4 shrink-0 items-center justify-center rounded-full border transition-all duration-150"
          [class.border-zinc-900]="isSelected(option)"
          [class.bg-zinc-900]="isSelected(option)"
          [class.border-zinc-300]="!isSelected(option)"
          [class.bg-white]="!isSelected(option)"
          [class.group-hover:border-zinc-500]="!option.disabled && !isSelected(option)"
          role="radio"
          [attr.aria-checked]="isSelected(option)"
          [attr.aria-disabled]="option.disabled"
        >
          <!-- Point intérieur -->
          @if (isSelected(option)) {
            <span class="h-1.5 w-1.5 rounded-full bg-white"></span>
          }
        </span>

        <!-- Label + description -->
        <span class="flex flex-col gap-0.5">
          <span
            class="text-sm font-medium leading-none transition-colors"
            [class.text-zinc-900]="isSelected(option)"
            [class.text-zinc-700]="!isSelected(option)"
          >
            {{ option.label }}
          </span>

          @if (option.description) {
            <span class="text-xs text-zinc-400 leading-snug">
              {{ option.description }}
            </span>
          }
        </span>
      </label>
    }

  </div>

  <!-- Message d'erreur -->
  @if (shouldShowError) {
    <span [id]="name() + '-error'" class="text-destructive text-sm" role="alert">
      {{ errorMessage }}
    </span>
  }

</fieldset>
