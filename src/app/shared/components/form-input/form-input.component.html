<fieldset class="flex flex-col gap-2">

  @if (label() !== null) {
    <label appLabel>
      {{ label() }}
      @if (required()) {
        <span class="text-destructive" aria-hidden="true">*</span>
      }
    </label>
  }

  <div class="relative">

    <input
      appInput
      [type]="resolvedType()"
      [attr.aria-invalid]="shouldShowError"
      [attr.aria-describedby]="shouldShowError ? name() + '-error' : null"
      [placeholder]="placeholder()"
      [formControlName]="name()"
      [attr.min]="min()"
      [attr.max]="max()"
      [attr.step]="step()"
      [class.pr-10]="isPasswordType()"
    />

    <!-- Bouton toggle password -->
    @if (isPasswordType()) {
      <button
        type="button"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground cursor-pointer"
        [attr.aria-label]="showPassword() ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
        (click)="togglePasswordVisibility()"
      >
        @if (showPassword()) {
          <lucide-icon [img]="icons.EyeOff" size="18" />
        } @else {
          <lucide-icon [img]="icons.Eye" size="18" />
        }
      </button>
    }

  </div>

  @if (shouldShowError) {
    <span [id]="name() + '-error'" class="text-destructive text-sm" role="alert">
      {{ errorMessage }}
    </span>
  }

</fieldset>
