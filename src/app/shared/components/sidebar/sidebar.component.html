<aside class="w-xs h-full border-r border-border bg-sidebar">
  <a class="flex items-center gap-2 py-3 px-5">
    <h2 appH2>CRM</h2>
  </a>
  <nav class="w-full">
    <ul class="flex flex-col gap-1 px-3">
      @for (item of mainItem; track item.label) {
      <li class="rounded-md hover:bg-accent hover:text-accent-foreground">
        <a
          class="flex w-full items-center gap-2 rounded-md px-3 py-2 text-sm font-medium"
          [routerLink]="item.href"
        >
          {{ item.label }}
        </a>
      </li>
      }
    </ul>
  </nav>
</aside>
