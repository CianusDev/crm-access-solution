<div class="max-w-md w-full flex flex-col gap-6">
  <div class="flex items-center mx-auto gap-2">
    <app-logo class="size-44" />
  </div>
  <div class="space-y-2">
    <h2 appH2>Connexion</h2>
    <p class="text-muted-foreground text-sm">Veuillez vous connecter à votre compte pour accéder à votre espace de travail.</p>
  </div>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="w-full flex flex-col gap-4">
    <app-form-input
      type="email"
      name="email"
      placeholder="Adresse e-mail"
    />
    <app-form-input
      type="password"
      name="password"
      placeholder="Mot de passe"
    />
    <button
      appLoadingButton
      type="submit"
      [loading]="isLoading()"
      loadingText="Connexion en cours..."
      class="w-full"
    >
      Se connecter
    </button>
  </form>
</div>
